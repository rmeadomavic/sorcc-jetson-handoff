<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="monospace" font-size="14">
  <title>Jetson Orin Nano 40-pin GPIO header — UART1 + GND highlighted</title>

  <!-- Background -->
  <rect width="720" height="520" fill="#fafafa"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">Jetson Orin Nano — 40-pin GPIO header</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#666">View from above. Pin 1 at top, near SD card slot.</text>

  <!-- Header outline -->
  <rect x="240" y="80" width="240" height="420" fill="#222" stroke="#000" stroke-width="2" rx="6"/>

  <!-- Pin grid: 20 rows of 2 pins each. Left column odd (1,3,5...), right column even (2,4,6...). -->
  <g id="pins">
    <!-- Pin 1 (3.3V) -->
    <circle cx="290" cy="100" r="7" fill="#ff5252"/>
    <text x="220" y="105" text-anchor="end" fill="#222">1</text>
    <text x="208" y="105" text-anchor="end" fill="#888" font-size="11">3.3V</text>
    <!-- Pin 2 (5V) -->
    <circle cx="430" cy="100" r="7" fill="#ff5252"/>
    <text x="500" y="105" text-anchor="start" fill="#222">2</text>
    <text x="512" y="105" text-anchor="start" fill="#888" font-size="11">5V</text>

    <!-- Pin 3 -->
    <circle cx="290" cy="120" r="7" fill="#aaa"/>
    <text x="220" y="125" text-anchor="end" fill="#222">3</text>
    <!-- Pin 4 (5V) -->
    <circle cx="430" cy="120" r="7" fill="#ff5252"/>
    <text x="500" y="125" text-anchor="start" fill="#222">4</text>
    <text x="512" y="125" text-anchor="start" fill="#888" font-size="11">5V</text>

    <!-- Pin 5 -->
    <circle cx="290" cy="140" r="7" fill="#aaa"/>
    <text x="220" y="145" text-anchor="end" fill="#222">5</text>
    <!-- Pin 6 (GND) — HIGHLIGHTED -->
    <circle cx="430" cy="140" r="9" fill="#000" stroke="#ffd54f" stroke-width="3"/>
    <text x="500" y="145" text-anchor="start" font-weight="bold" fill="#222">6</text>
    <text x="512" y="145" text-anchor="start" font-weight="bold" fill="#d84315" font-size="13">GND  ←  to Pixhawk pin 6</text>

    <!-- Pin 7 -->
    <circle cx="290" cy="160" r="7" fill="#aaa"/>
    <text x="220" y="165" text-anchor="end" fill="#222">7</text>
    <!-- Pin 8 (UART1 TX) — HIGHLIGHTED -->
    <circle cx="430" cy="160" r="9" fill="#1e88e5" stroke="#ffd54f" stroke-width="3"/>
    <text x="500" y="165" text-anchor="start" font-weight="bold" fill="#222">8</text>
    <text x="512" y="165" text-anchor="start" font-weight="bold" fill="#1565c0" font-size="13">UART1 TX  ←  to Pixhawk RX (pin 3)</text>

    <!-- Pin 9 (GND) -->
    <circle cx="290" cy="180" r="7" fill="#000"/>
    <text x="220" y="185" text-anchor="end" fill="#222">9</text>
    <text x="208" y="185" text-anchor="end" fill="#888" font-size="11">GND</text>
    <!-- Pin 10 (UART1 RX) — HIGHLIGHTED -->
    <circle cx="430" cy="180" r="9" fill="#43a047" stroke="#ffd54f" stroke-width="3"/>
    <text x="500" y="185" text-anchor="start" font-weight="bold" fill="#222">10</text>
    <text x="512" y="185" text-anchor="start" font-weight="bold" fill="#2e7d32" font-size="13">UART1 RX  ←  to Pixhawk TX (pin 2)</text>

    <!-- Remaining pins, simplified — just dots and numbers -->
    <g fill="#aaa">
      <circle cx="290" cy="200" r="5"/><text x="220" y="205" text-anchor="end" fill="#888">11</text>
      <circle cx="430" cy="200" r="5"/><text x="500" y="205" text-anchor="start" fill="#888">12</text>
      <circle cx="290" cy="220" r="5"/><text x="220" y="225" text-anchor="end" fill="#888">13</text>
      <circle cx="430" cy="220" r="5" fill="#000"/><text x="500" y="225" text-anchor="start" fill="#888">14 (GND)</text>
      <circle cx="290" cy="240" r="5"/><text x="220" y="245" text-anchor="end" fill="#888">15</text>
      <circle cx="430" cy="240" r="5"/><text x="500" y="245" text-anchor="start" fill="#888">16</text>
      <circle cx="290" cy="260" r="5"/><text x="220" y="265" text-anchor="end" fill="#888">17</text>
      <circle cx="430" cy="260" r="5"/><text x="500" y="265" text-anchor="start" fill="#888">18</text>
      <circle cx="290" cy="280" r="5"/><text x="220" y="285" text-anchor="end" fill="#888">19</text>
      <circle cx="430" cy="280" r="5" fill="#000"/><text x="500" y="285" text-anchor="start" fill="#888">20 (GND)</text>
      <circle cx="290" cy="300" r="5"/><text x="220" y="305" text-anchor="end" fill="#888">21</text>
      <circle cx="430" cy="300" r="5"/><text x="500" y="305" text-anchor="start" fill="#888">22</text>
      <circle cx="290" cy="320" r="5"/><text x="220" y="325" text-anchor="end" fill="#888">23</text>
      <circle cx="430" cy="320" r="5"/><text x="500" y="325" text-anchor="start" fill="#888">24</text>
      <circle cx="290" cy="340" r="5" fill="#000"/><text x="220" y="345" text-anchor="end" fill="#888">25 (GND)</text>
      <circle cx="430" cy="340" r="5"/><text x="500" y="345" text-anchor="start" fill="#888">26</text>
      <circle cx="290" cy="360" r="5"/><text x="220" y="365" text-anchor="end" fill="#888">27</text>
      <circle cx="430" cy="360" r="5"/><text x="500" y="365" text-anchor="start" fill="#888">28</text>
      <circle cx="290" cy="380" r="5"/><text x="220" y="385" text-anchor="end" fill="#888">29</text>
      <circle cx="430" cy="380" r="5" fill="#000"/><text x="500" y="385" text-anchor="start" fill="#888">30 (GND)</text>
      <circle cx="290" cy="400" r="5"/><text x="220" y="405" text-anchor="end" fill="#888">31</text>
      <circle cx="430" cy="400" r="5"/><text x="500" y="405" text-anchor="start" fill="#888">32</text>
      <circle cx="290" cy="420" r="5"/><text x="220" y="425" text-anchor="end" fill="#888">33</text>
      <circle cx="430" cy="420" r="5" fill="#000"/><text x="500" y="425" text-anchor="start" fill="#888">34 (GND)</text>
      <circle cx="290" cy="440" r="5"/><text x="220" y="445" text-anchor="end" fill="#888">35</text>
      <circle cx="430" cy="440" r="5"/><text x="500" y="445" text-anchor="start" fill="#888">36</text>
      <circle cx="290" cy="460" r="5"/><text x="220" y="465" text-anchor="end" fill="#888">37</text>
      <circle cx="430" cy="460" r="5"/><text x="500" y="465" text-anchor="start" fill="#888">38</text>
      <circle cx="290" cy="480" r="5" fill="#000"/><text x="220" y="485" text-anchor="end" fill="#888">39 (GND)</text>
      <circle cx="430" cy="480" r="5"/><text x="500" y="485" text-anchor="start" fill="#888">40</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 80)">
    <text x="0" y="0" font-weight="bold" fill="#222">Legend</text>
    <circle cx="10" cy="20" r="6" fill="#1e88e5"/><text x="24" y="25" fill="#222">UART1 TX</text>
    <circle cx="10" cy="40" r="6" fill="#43a047"/><text x="24" y="45" fill="#222">UART1 RX</text>
    <circle cx="10" cy="60" r="6" fill="#000"/><text x="24" y="65" fill="#222">GND</text>
    <circle cx="10" cy="80" r="6" fill="#ff5252"/><text x="24" y="85" fill="#222">Power (3.3V/5V)</text>
    <circle cx="10" cy="100" r="6" fill="#aaa"/><text x="24" y="105" fill="#222">Other GPIO</text>
  </g>

  <!-- "Pin 1" arrow -->
  <text x="120" y="220" fill="#d84315" font-size="13" font-weight="bold">Pin 1 is at the top corner</text>
  <text x="120" y="238" fill="#d84315" font-size="13" font-weight="bold">closest to the SD card slot.</text>
  <text x="120" y="256" fill="#666" font-size="12">Look for the silkscreen "1" or</text>
  <text x="120" y="272" fill="#666" font-size="12">the square solder pad.</text>
</svg>
